<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Assistant Written Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#1B2A3A;
  --ink-soft:#4A5A6B;
  --paper:#E9E4D6;
  --card:#F8F5EC;
  --brass:#B08A3E;
  --stamp:#A6362C;
  --line:#C9C1A9;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);}
body{
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--ink);
}
.eaw-root{
  min-height:100vh;
  padding:32px 16px 64px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.eaw-page{
  width:100%;
  max-width:720px;
}
.eaw-letterhead{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:2px solid var(--ink);
  padding-bottom:14px;
  margin-bottom:28px;
}
.eaw-brand{
  font-family:'IBM Plex Serif',serif;
  font-weight:700;
  font-size:22px;
  letter-spacing:0.5px;
}
.eaw-brand span{color:var(--stamp);}
.eaw-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-soft);
}
.eaw-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:2px;
  padding:28px 30px;
  margin-bottom:20px;
  box-shadow:0 1px 0 rgba(27,42,58,0.05);
}
.eaw-h1{
  font-family:'IBM Plex Serif',serif;
  font-weight:600;
  font-size:26px;
  margin:0 0 8px;
  line-height:1.25;
}
.eaw-h2{
  font-family:'IBM Plex Serif',serif;
  font-weight:600;
  font-size:19px;
  margin:0 0 12px;
}
.eaw-sub{
  color:var(--ink-soft);
  font-size:14.5px;
  line-height:1.6;
  margin:0 0 18px;
}
.eaw-note{
  background:#fff;
  border-left:3px solid var(--stamp);
  padding:12px 16px;
  font-size:13.5px;
  line-height:1.6;
  color:var(--ink);
  margin-bottom:4px;
}
.eaw-msg{
  background:#fff;
  border-left:3px solid var(--brass);
  padding:14px 16px;
  font-size:13.5px;
  line-height:1.65;
  color:var(--ink-soft);
  white-space:pre-wrap;
  font-family:'IBM Plex Mono',monospace;
  margin-bottom:18px;
}
.eaw-msg .eaw-from{
  font-family:'IBM Plex Sans',sans-serif;
  font-size:11.5px;
  color:var(--brass);
  letter-spacing:0.5px;
  text-transform:uppercase;
  margin-bottom:8px;
  display:block;
}
.eaw-field{margin-bottom:6px;}
.eaw-label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.eaw-input{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:2px;
  font-size:15px;
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--ink);
}
.eaw-input:focus{outline:2px solid var(--brass);outline-offset:1px;}
textarea.eaw-input{
  min-height:200px;
  resize:vertical;
  line-height:1.55;
}
.eaw-btnrow{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.eaw-btn{
  font-family:'IBM Plex Sans',sans-serif;
  font-weight:600;
  font-size:14.5px;
  padding:12px 22px;
  border-radius:2px;
  border:none;
  cursor:pointer;
  background:var(--ink);
  color:var(--card);
  transition:transform .08s ease, background .15s ease;
}
.eaw-btn:hover{background:#2b3f54;}
.eaw-btn:active{transform:scale(0.97);}
.eaw-btn:disabled{background:#9aa3ab;cursor:not-allowed;}
.eaw-btn-ghost{
  background:transparent;
  color:var(--ink-soft);
  border:1px solid var(--line);
}
.eaw-btn-ghost:hover{background:rgba(0,0,0,0.03);color:var(--ink);}
.eaw-taskhead{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:12px;
  margin-bottom:10px;
}
.eaw-tasklabel{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--brass);
}
.eaw-timer{
  font-family:'IBM Plex Mono',monospace;
  font-size:15px;
  font-weight:600;
  letter-spacing:0.5px;
  color:var(--ink);
  background:#fff;
  border:1px solid var(--line);
  padding:3px 10px;
  border-radius:2px;
  white-space:nowrap;
}
.eaw-footer-note{
  font-size:12px;
  color:var(--ink-soft);
  text-align:center;
  margin-top:26px;
  font-family:'IBM Plex Mono',monospace;
}
.eaw-small{font-size:12px;color:var(--ink-soft);}
.eaw-error{color:var(--stamp);font-size:13px;margin-top:8px;}
.eaw-stamp-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:50;
}
.eaw-stamp{
  border:6px solid var(--stamp);
  color:var(--stamp);
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  padding:14px 30px;
  border-radius:8px;
  font-size:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  transform:scale(2.6) rotate(-16deg);
  opacity:0;
  background:rgba(255,255,255,0.9);
}
@keyframes stampDown{
  0%{transform:scale(2.6) rotate(-16deg);opacity:0;}
  55%{transform:scale(0.94) rotate(-9deg);opacity:1;}
  70%{transform:scale(1.05) rotate(-11deg);opacity:1;}
  100%{transform:scale(1) rotate(-10deg);opacity:1;}
}
.eaw-stamp.eaw-anim{animation:stampDown .5s ease-out forwards;}
.eaw-answer-block{
  background:#fff;
  border:1px solid var(--line);
  padding:14px 16px;
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.6;
  font-family:'IBM Plex Mono',monospace;
  max-height:420px;
  overflow-y:auto;
}
</style>
</head>
<body>
<div class="eaw-root" id="eawRoot"></div>
<div class="eaw-stamp-overlay" id="eawStampOverlay" style="display:none;">
  <div class="eaw-stamp" id="eawStamp">Logged</div>
</div>

<script>
(function(){
  // ---- Paste the Web App URL from your Google Apps Script deployment here ----
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweTL3MBnu8-wytKRO_XmAcCJVPdTzHDoYGGBqHDj5sttq8nSVq7HPqTdkp0CVWX4Lf9Q/exec"; // ends in /exec

  // ---- Fallback inbox, used only if the automatic submission fails ----
  const ADMIN_EMAIL = "madeleine.tan@towercapitalasia.com"; // <-- replace with your real email address

  const TASKS = [
    { key: "reply_exec", title: "A reply to your executive" },
    { key: "board_email", title: "An email to the board and their supporting EAs" },
    { key: "tca_email", title: "An email to the TCA internal team invited to the Board meeting" }
  ];

  const ADDITIONAL_CONTEXT = "You also know it is difficult to find an alternative session in the next 3 months if we do not lock in a date now.";

  const REFERENCE_MESSAGE =
`From: Peter
Subject: Board meeting Thursday

Okay so I need you to cancel Thursday's board meeting. We have another important deal for ABC Co and the CEO wants to meet me that timing – can't do any other time. Not reschedule, actually cancel it, because two of our board members just told me this morning they can't make it and honestly without them we won't have quorum anyway so there's no point trying to push through, and separately legal flagged yesterday that they want more time to review the updated bylaws language before it goes in front of the board so it's actually decent timing. We'll need to pick a new date but I don't want to commit to one yet until I've talked to the two board members directly about their availability over the next few weeks, probably won't have that nailed down until early next week.

In the meantime, can you let the team know the materials they were prepping don't need to be finalized by Wednesday anymore, just keep working on them at a normal pace.

Thanks.
Peter`;

  const state = {
    screen: "loading",   // loading | closed | pin-gate | form | submitting | done | submit-error
    config: null,
    configError: false,
    pinError: "",
    doneName: "",
    doneTotal: 0,
    compiledText: "",
    pendingPayload: null,
    retrying: false
  };

  const track = {};
  TASKS.forEach(t => { track[t.key] = { text: "" }; });

  let liveInterval = null;
  let pageStart = null;

  const root = document.getElementById("eawRoot");

  function fmt(sec){
    sec = Math.max(0, Math.floor(sec));
    const m = Math.floor(sec/60).toString().padStart(2,"0");
    const s = (sec%60).toString().padStart(2,"0");
    return m+":"+s;
  }

  function esc(str){
    const d = document.createElement("div");
    d.innerText = str == null ? "" : str;
    return d.innerHTML;
  }

  function overallElapsed(){
    return pageStart ? (Date.now()-pageStart)/1000 : 0;
  }

  function stopLiveTimer(){
    if(liveInterval){ clearInterval(liveInterval); liveInterval=null; }
  }

  function letterhead(eyebrow){
    return `<div class="eaw-letterhead">
      <div class="eaw-brand">TCA</div>
      <div class="eaw-eyebrow">${esc(eyebrow||"")}</div>
    </div>`;
  }

  function render(){
    if(state.screen==="loading") return renderLoading();
    if(state.screen==="closed") return renderClosed();
    if(state.screen==="pin-gate") return renderPinGate();
    if(state.screen==="form") return renderForm();
    if(state.screen==="submitting") return renderSubmitting();
    if(state.screen==="done") return renderDone();
    if(state.screen==="submit-error") return renderSubmitError();
  }

  function renderSubmitting(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Submitting")}
        <div class="eaw-card" style="text-align:center;">
          <h1 class="eaw-h1">Filing your responses&hellip;</h1>
          <p class="eaw-sub">One moment.</p>
        </div>
      </div>
    `;
  }

  function renderLoading(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Loading")}
        <div class="eaw-card"><p class="eaw-sub">Checking access&hellip;</p></div>
      </div>
    `;
  }

  function renderClosed(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Not open")}
        <div class="eaw-card">
          <h1 class="eaw-h1">This assessment isn't open right now</h1>
          <p class="eaw-sub">${state.configError ? "We couldn't reach the access settings for this test." : "Please check with your recruiter for timing, or try again later."}</p>
        </div>
      </div>
    `;
  }

  function renderPinGate(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Access")}
        <div class="eaw-card">
          <h1 class="eaw-h1">Executive Assistant Written Test</h1>
          <p class="eaw-sub">Enter the access code your recruiter shared with you to begin. This is a timed assessment. The clock starts upon acceptance of the access code.</p>
          <div class="eaw-field">
            <label class="eaw-label">Access code</label>
            <input class="eaw-input" id="eawPinInput" type="text" inputmode="numeric" autocomplete="off" placeholder="Access code"/>
          </div>
          <div class="eaw-error" style="${state.pinError?"":"display:none;"}">${esc(state.pinError||"")}</div>
          <div class="eaw-btnrow">
            <button class="eaw-btn" id="eawPinBtn">Continue</button>
          </div>
        </div>
      </div>
    `;
    const input = document.getElementById("eawPinInput");
    input.focus();
    input.addEventListener("keydown", (e) => { if(e.key==="Enter") onPinSubmit(); });
    document.getElementById("eawPinBtn").onclick = onPinSubmit;
  }

  function onPinSubmit(){
    const entered = document.getElementById("eawPinInput").value.trim();
    const expected = (state.config && state.config.pin ? String(state.config.pin) : "").trim();
    if(!entered){
      state.pinError = "Enter the access code to continue.";
      render();
      return;
    }
    if(entered === expected){
      state.pinError = "";
      pageStart = Date.now();
      state.screen = "form";
      render();
    } else {
      state.pinError = "That code isn't correct. Check with your recruiter and try again.";
      render();
    }
  }

  function renderForm(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Written Exercise")}
        <div class="eaw-card">
          <h1 class="eaw-h1">Executive Assistant Written Test</h1>
          <div class="eaw-taskhead" style="margin-bottom:14px;">
            <span class="eaw-tasklabel">Instructions</span>
            <span class="eaw-timer" id="eawGlobalTimer">00:00</span>
          </div>
          <p class="eaw-sub">Your executive forwards you the message below. From it, you'll produce three pieces of correspondence, to your executive, to the board members and the TCA internal team.</p>
          <p class="eaw-sub">The time you take to complete the assessment is recorded. There's no overall time limit, but working efficiently is part of what's assessed. You should plan to take this test in one sitting.</p>
          <div class="eaw-note"><strong>Also relevant:</strong> ${esc(ADDITIONAL_CONTEXT)}</div>
        </div>

        <div class="eaw-card">
          <div class="eaw-field">
            <label class="eaw-label">Your name</label>
            <input class="eaw-input" id="eawName" type="text" placeholder="Full name"/>
          </div>
        </div>

        <div class="eaw-card">
          <div class="eaw-msg"><span class="eaw-from">Forwarded message</span>${esc(REFERENCE_MESSAGE)}</div>
        </div>

        ${TASKS.map((t, i) => `
        <div class="eaw-card">
          <div class="eaw-taskhead">
            <span class="eaw-tasklabel">Task ${i+1} of ${TASKS.length}</span>
          </div>
          <h2 class="eaw-h2">${esc(t.title)}</h2>
          <div class="eaw-field">
            <label class="eaw-label">Your response</label>
            <textarea class="eaw-input" id="eawArea_${t.key}" placeholder="Write here...">${esc(track[t.key].text)}</textarea>
          </div>
        </div>
        `).join("")}

        <div class="eaw-card">
          <div id="eawFormErr" class="eaw-error" style="display:none;">Please enter your name and write all three responses before submitting.</div>
          <div class="eaw-btnrow">
            <button class="eaw-btn" id="eawSubmitBtn">Submit assessment</button>
          </div>
        </div>
        <div class="eaw-footer-note">The clock runs from when you enter the access code until you submit.</div>
      </div>
    `;

    TASKS.forEach(t => {
      const area = document.getElementById("eawArea_"+t.key);
      area.addEventListener("input", () => { track[t.key].text = area.value; });
    });

    stopLiveTimer();
    liveInterval = setInterval(() => {
      const el = document.getElementById("eawGlobalTimer");
      if(el){ el.textContent = fmt(overallElapsed()); }
    }, 250);

    document.getElementById("eawSubmitBtn").onclick = onSubmit;
  }

  function buildCompiledText(name, totalSeconds){
    const lines = [];
    lines.push("Executive Assistant Written Test — Submission");
    lines.push("");
    lines.push("Candidate: " + name);
    lines.push("Total time: " + fmt(totalSeconds));
    lines.push("Submitted: " + new Date().toLocaleString());
    lines.push("");
    TASKS.forEach(t => {
      lines.push("——— " + t.title + " ———");
      lines.push(track[t.key].text.trim());
      lines.push("");
    });
    return lines.join("\n");
  }

  async function onSubmit(){
    const name = document.getElementById("eawName").value.trim();
    const allFilled = TASKS.every(t => track[t.key].text.trim().length>0);
    if(!name || !allFilled){
      document.getElementById("eawFormErr").style.display = "block";
      return;
    }
    document.getElementById("eawFormErr").style.display = "none";
    document.getElementById("eawSubmitBtn").disabled = true;

    stopLiveTimer();
    const totalSeconds = overallElapsed();
    const compiled = buildCompiledText(name, totalSeconds);

    // Lock the payload now — nothing below this point can change what gets sent.
    const payload = {
      name: name,
      totalTime: fmt(totalSeconds),
      totalSeconds: totalSeconds,
      submittedAt: new Date().toISOString(),
      answers: TASKS.map(t => ({ key: t.key, title: t.title, text: track[t.key].text.trim() }))
    };
    state.pendingPayload = payload;
    state.doneName = name;
    state.doneTotal = totalSeconds;
    state.compiledText = compiled;

    await playStamp(fmt(totalSeconds));
    await sendPayload();
  }

  async function sendPayload(){
    state.screen = "submitting";
    render();
    try{
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(state.pendingPayload)
      });
      // no-cors means we can't read the response, but if fetch didn't throw,
      // the request reached the network successfully.
      state.screen = "done";
    }catch(e){
      state.screen = "submit-error";
    }
    render();
  }

  function playStamp(label){
    return new Promise(resolve => {
      const overlay = document.getElementById("eawStampOverlay");
      const stamp = document.getElementById("eawStamp");
      stamp.textContent = "Logged " + label;
      stamp.classList.remove("eaw-anim");
      void stamp.offsetWidth;
      overlay.style.display = "flex";
      stamp.classList.add("eaw-anim");
      setTimeout(() => {
        overlay.style.display = "none";
        resolve();
      }, 750);
    });
  }

  function renderDone(){
    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Complete")}
        <div class="eaw-card" style="text-align:center;">
          <h1 class="eaw-h1">Thank you for taking the test.</h1>
          <p class="eaw-sub">Your responses have been recorded.</p>
        </div>
      </div>
    `;
  }

  function renderSubmitError(){
    const subject = "EA Written Test — " + state.doneName;
    const body = state.compiledText;
    const fullMailto = "mailto:" + encodeURIComponent(ADMIN_EMAIL) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    const bodyTooLong = fullMailto.length > 1800;
    const safeMailto = bodyTooLong
      ? "mailto:" + encodeURIComponent(ADMIN_EMAIL) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent("My answers are copied below — please paste them here before sending:\n\n")
      : fullMailto;

    root.innerHTML = `
      <div class="eaw-page">
        ${letterhead("Connection issue")}
        <div class="eaw-card" style="text-align:center;">
          <h1 class="eaw-h1">Your test is complete, but we couldn't confirm it was received</h1>
          <p class="eaw-sub">This is usually just a network hiccup. Try sending again first — your answers and timing are already locked in and won't change.</p>
          <div class="eaw-btnrow" style="justify-content:center;">
            <button class="eaw-btn" id="eawRetryBtn">Try sending again</button>
          </div>
        </div>
        <div class="eaw-card">
          <p class="eaw-sub" style="text-align:center;">If it still doesn't go through, use this backup instead:</p>
          <div class="eaw-btnrow" style="justify-content:center;margin-bottom:16px;">
            <button class="eaw-btn eaw-btn-ghost" id="eawCopyBtn">Copy my answers</button>
            <a class="eaw-btn eaw-btn-ghost" href="${safeMailto}" id="eawMailtoLink" style="text-decoration:none;display:inline-block;">Email my answers</a>
          </div>
          ${bodyTooLong ? `<p class="eaw-sub" style="text-align:center;">Your answers were too long to include automatically. Click "Copy my answers" first, then "Email my answers," and paste before sending.</p>` : ""}
          <label class="eaw-label">Your locked submission</label>
          <div class="eaw-answer-block">${esc(state.compiledText)}</div>
        </div>
      </div>
    `;
    document.getElementById("eawRetryBtn").onclick = () => { sendPayload(); };
    document.getElementById("eawCopyBtn").onclick = () => {
      navigator.clipboard.writeText(state.compiledText).then(()=>{
        const btn = document.getElementById("eawCopyBtn");
        btn.textContent = "Copied!";
        setTimeout(()=>{btn.textContent="Copy my answers";}, 1500);
      }).catch(()=>{});
    };
  }

  async function init(){
    try{
      const res = await fetch("config.json?t=" + Date.now(), {cache:"no-store"});
      const cfg = await res.json();
      state.config = cfg;
      if(!cfg || cfg.active !== true){
        state.screen = "closed";
      } else {
        state.screen = "pin-gate";
      }
    }catch(e){
      state.configError = true;
      state.screen = "closed";
    }
    render();
  }

  init();
})();
</script>
</body>
</html>
